<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文海报合集</title>
<meta name="description" content="AI / 机器人 / 三维视觉 论文中文图文海报合集，每篇含动机·方法·实验·局限性。">
<style>
 body{margin:0;background:#f8f8f6;color:#201f1c;line-height:1.6;font-family:-apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",Roboto,sans-serif}
 .wrap{max-width:1180px;margin:0 auto;padding:58px 22px 80px}
 h1{font-size:33px;margin:0 0 8px}
 .intro{color:#6b675f;font-size:16.5px;margin:0 0 4px}
 .count{color:#5a5953;font-size:14px;margin-bottom:8px}
 .search{width:100%;max-width:420px;margin:14px 0 4px;padding:10px 14px;border-radius:10px;border:1px solid #e8e4dc;background:#ffffff;color:#201f1c;font-size:14px}
 .tags{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 2px;align-items:center}
 .tags .lbl{font-size:12px;color:#6b675f;margin-right:2px}
 .tag{cursor:pointer;font-size:12px;color:#6b675f;background:#ffffff;border:1px solid #e8e4dc;border-radius:999px;padding:3px 11px;user-select:none;transition:.14s}
 .tag:hover{border-color:#5a5953;color:#3a3833}
 .tag.on{background:#f1efea;border-color:#5a5953;color:#3a3833}
 .tag b{color:#6b675f;font-weight:400;margin-left:5px;font-size:11px}
 .tag.on b{color:#5a5953}
 .active{margin:10px 0 2px;font-size:13px;color:#6b675f}
 .active b{color:#3a3833;font-weight:600}
 .active .clr{cursor:pointer;color:#b45309;margin-left:10px;border:1px solid #f2dec0;background:#fdf3e7;border-radius:6px;padding:1px 9px;font-size:12px}
 h2{font-size:19px;margin:34px 0 14px;padding-left:12px;border-left:3px solid #5a5953;color:#3a3833;display:flex;align-items:center;gap:10px}
 h2.snaphead{border-left-color:#5a5953;color:#3a3833}
 .snapmore{color:#6b675f;font-size:12.5px;margin:6px 0 0;padding-left:12px}
 .gc{font-size:12px;color:#6b675f;background:#ffffff;border:1px solid #e8e4dc;border-radius:999px;padding:1px 9px}
 .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
 @media(max-width:900px){.grid{grid-template-columns:1fr 1fr}} @media(max-width:600px){.grid{grid-template-columns:1fr}}
 a.card{display:flex;flex-direction:column;text-decoration:none;color:inherit;border:1px solid #e8e4dc;border-radius:13px;padding:15px 17px;background:linear-gradient(180deg,#ffffff,#ffffff);transition:.16s}
 a.card:hover{transform:translateY(-3px);border-color:#5a5953}
 .date{font-size:11px;color:#6b675f;font-family:ui-monospace,monospace;margin-bottom:6px}
 .t{font-size:15px;font-weight:700;margin-bottom:7px;color:#201f1c;line-height:1.35}
 .s{color:#6b675f;font-size:12.5px;flex:1;margin-bottom:9px}
 .kw{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
 .kw span{font-size:11px;color:#6b675f;background:#f1efea;border:1px solid #f1efea;border-radius:6px;padding:1px 7px;cursor:pointer;transition:.14s}
 .kw span:hover{color:#3a3833;border-color:#5a5953}
 .ax{align-self:flex-start;font-size:11.5px;color:#5a5953;background:#f1efea;border:1px solid #f1efea;border-radius:6px;padding:2px 8px;font-family:ui-monospace,monospace}
 .ax.noax{color:#b45309;background:#fdf3e7;border-color:#f2dec0}
 footer{color:#6b675f;font-size:13px;margin-top:46px;text-align:center}
 .hide{display:none!important}
</style></head><body><div class="wrap">
<h1>论文海报合集</h1>
<p class="intro">每篇一页图文海报，含 动机 / 方法 / 实验 / 局限性 四节，配论文真实插图，页眉页脚均链原文。</p>
<p class="count">共 0 篇 · 每日新增</p>
<input class="search" id="q" placeholder="🔍 搜索标题 / 关键词 / arXiv 号…" oninput="render()">
<div class="tags"><span class="lbl">标签：</span></div>
<div class="active hide" id="active">已筛选标签：<b id="activeLbl"></b><span class="clr" onclick="clearTag()">清除 ✕</span></div>

<footer>由各论文 arXiv HTML / PDF 源与插图整理生成 · 数值均引自原文 · 仅供学习参考</footer>
</div>
<script>
var active="";  // active tag, lowercased; "" = none
function render(){
 var q=document.getElementById('q').value.toLowerCase();
 document.querySelectorAll('a.card').forEach(function(c){
  var okq=!q||c.textContent.toLowerCase().indexOf(q)>=0;
  var okt=!active||('|'+(c.dataset.kw||'')+'|').indexOf('|'+active+'|')>=0;
  c.classList.toggle('hide',!(okq&&okt));});
 document.querySelectorAll('h2').forEach(function(h){
  var g=h.nextElementSibling, any=g&&g.querySelector('a.card:not(.hide)');
  h.classList.toggle('hide',!any); if(g) g.classList.toggle('hide',!any);});
 document.querySelectorAll('.tag').forEach(function(p){
  p.classList.toggle('on',(p.dataset.tag||'').toLowerCase()===active);});
 var b=document.getElementById('active');
 b.classList.toggle('hide',!active);
 document.getElementById('activeLbl').textContent=active;
 var sm=document.querySelector('.snapmore'); if(sm) sm.classList.toggle('hide',!!(q||active));
}
function toggleTag(t){var lt=(t||'').toLowerCase(); active=(active===lt)?"":lt; render();}
function clearTag(){active=""; render();}
document.addEventListener('click',function(e){
 var el=e.target.closest('[data-tag]');
 if(el){e.preventDefault(); e.stopPropagation(); toggleTag(el.getAttribute('data-tag'));}
});
</script>
</body></html>
